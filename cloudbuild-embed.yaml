steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-f'
      - 'Dockerfile.embed'
      - '-t'
      - 'us-south1-docker.pkg.dev/$PROJECT_ID/dark-horse-repo/embed:$BUILD_ID'
      - '-t'
      - 'us-south1-docker.pkg.dev/$PROJECT_ID/dark-horse-repo/embed:latest'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'us-south1-docker.pkg.dev/$PROJECT_ID/dark-horse-repo/embed:$BUILD_ID'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'us-south1-docker.pkg.dev/$PROJECT_ID/dark-horse-repo/embed:latest'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'dark-horse-embed'
      - '--image'
      - 'us-south1-docker.pkg.dev/$PROJECT_ID/dark-horse-repo/embed:$BUILD_ID'
      - '--region'
      - 'us-south1'
      - '--port'
      - '8080'
      - '--no-allow-unauthenticated'
      - '--memory'
      - '1Gi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '2'
      - '--concurrency'
      - '10'

timeout: 2400s
options:
  logging: CLOUD_LOGGING_ONLY
