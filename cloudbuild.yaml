steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'us-south1-docker.pkg.dev/$PROJECT_ID/nola-pulse/app:$COMMIT_SHA', '.']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-south1-docker.pkg.dev/$PROJECT_ID/nola-pulse/app:$COMMIT_SHA']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'nola-pulse'
      - '--image'
      - 'us-south1-docker.pkg.dev/$PROJECT_ID/nola-pulse/app:$COMMIT_SHA'
      - '--region'
      - 'us-south1'
      - '--port'
      - '8080'
      - '--allow-unauthenticated'

options:
  logging: CLOUD_LOGGING_ONLY
