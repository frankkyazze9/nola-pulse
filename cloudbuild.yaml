steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-south1-docker.pkg.dev/$PROJECT_ID/dark-horse-repo/app:$BUILD_ID'
      - '-t'
      - 'us-south1-docker.pkg.dev/$PROJECT_ID/dark-horse-repo/app:latest'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'us-south1-docker.pkg.dev/$PROJECT_ID/dark-horse-repo/app:$BUILD_ID'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'us-south1-docker.pkg.dev/$PROJECT_ID/dark-horse-repo/app:latest'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'dark-horse'
      - '--image'
      - 'us-south1-docker.pkg.dev/$PROJECT_ID/dark-horse-repo/app:$BUILD_ID'
      - '--region'
      - 'us-south1'
      - '--port'
      - '8080'
      - '--allow-unauthenticated'
      - '--set-secrets'
      - 'DATABASE_URL=DATABASE_URL:latest,ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest,CRON_SECRET=CRON_SECRET:latest,ADMIN_PASSWORD=ADMIN_PASSWORD:latest'
      - '--set-env-vars'
      - 'GCP_PROJECT_ID=$PROJECT_ID,GCS_BUCKET=dark-horse-docs'
      - '--add-cloudsql-instances'
      - 'nola-ai-innovation:us-south1:nola-pulse-db'

options:
  logging: CLOUD_LOGGING_ONLY
